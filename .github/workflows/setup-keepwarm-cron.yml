name: Install server-side keep-warm cron

# Installs a cPanel cron job on the host itself that curls the site every
# 2 minutes, keeping the Passenger Node app warm. This is the authoritative
# keep-warm: GitHub's scheduled workflows (keep-warm.yml) are best-effort and
# routinely run 10-15 minutes late, which still lets the app go cold.
#
# Runs when this file changes (i.e. once, on merge) or manually. Idempotent:
# it checks the existing crontab and only adds the entry if missing.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/setup-keepwarm-cron.yml"

jobs:
  install-cron:
    runs-on: ubuntu-latest
    env:
      CPANEL_DOMAIN: ${{ secrets.CPANEL_DOMAIN }}
      CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
      CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
    steps:
      - name: Ensure keep-warm cron exists
        run: |
          capi() {
            local module=$1 func=$2; shift 2
            curl -sk -G "https://$CPANEL_DOMAIN:2083/json-api/cpanel" \
              -H "Authorization: cpanel $CPANEL_USERNAME:$CPANEL_TOKEN" \
              --data-urlencode "cpanel_jsonapi_user=$CPANEL_USERNAME" \
              --data-urlencode "cpanel_jsonapi_apiversion=2" \
              --data-urlencode "cpanel_jsonapi_module=$module" \
              --data-urlencode "cpanel_jsonapi_func=$func" \
              "$@"
          }

          # /healthz (not /) on purpose: it warms firebase-admin + a Firestore
          # connection — the machinery a login/change-PIN server call uses.
          # A bare `/` ping only kept the HTML tier warm and left the login
          # path cold, which is what produced first-login 408s. If an older
          # `/` cron is still present it's now redundant but harmless; remove
          # it via cPanel → Cron Jobs if you want a single entry.
          CMD='curl -s -o /dev/null --max-time 50 https://pos.polishstation.lk/healthz >/dev/null 2>&1'

          # This installer is a best-effort FOURTH keep-warm layer. The login
          # path is already warmed without it by: (1) start.mjs self-warming
          # /healthz on boot, (2) an open tab pinging /healthz every 4 min, and
          # (3) keep-warm.yml pinging /healthz every 5 min (no cPanel token).
          # So if the cPanel API token lacks the Cron ACL, we DO NOT fail the
          # run — we print the one-line manual fix and exit 0, rather than leave
          # a permanently-red workflow that trains everyone to ignore Actions.
          manual_instructions() {
            echo ""
            echo "⚠️  Could not auto-manage the cPanel cron (see error above)."
            echo "    Most likely the cPanel API token is missing the 'Cron' ACL."
            echo "    The app is still kept warm by boot self-warm + tab pings +"
            echo "    the keep-warm.yml Action, so this is an optimization only."
            echo ""
            echo "    To enable the 2-minute server-side cron, EITHER:"
            echo "    • cPanel → Security → Manage API Tokens → grant this token the"
            echo "      'Cron' feature, then re-run this workflow, OR"
            echo "    • cPanel → Cron Jobs → add (every 2 min, i.e. */2 * * * *):"
            echo "      $CMD"
            echo "    If an older cron pointing at '/' exists, repoint it at /healthz."
          }

          echo "=== current crontab ==="
          LIST=$(capi Cron listcron)
          echo "$LIST" | head -c 2000; echo

          if echo "$LIST" | grep -qi '"error":"Access denied"'; then
            echo "cPanel API token cannot access the Cron module."
            manual_instructions
            exit 0
          fi

          if echo "$LIST" | grep -q "pos.polishstation.lk/healthz"; then
            echo "keep-warm /healthz cron already present — nothing to do"
            exit 0
          fi

          echo "=== adding keep-warm cron (every 2 minutes) ==="
          RESULT=$(capi Cron add_line \
            --data-urlencode "minute=*/2" \
            --data-urlencode "hour=*" \
            --data-urlencode "day=*" \
            --data-urlencode "month=*" \
            --data-urlencode "weekday=*" \
            --data-urlencode "command=$CMD")
          echo "$RESULT" | head -c 1000; echo

          if echo "$RESULT" | grep -qi '"status":1\|linekey'; then
            echo "✅ keep-warm cron installed"
          else
            echo "cron add did not confirm success."
            manual_instructions
            # Non-fatal: the app-level warm-up layers already cover this.
            exit 0
          fi
