name: Build and deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build, package, and FTP deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      # node_modules is never uploaded: the build inlines every dependency into
      # dist/server/server.js (see scripts/bundle-server.mjs), and start.mjs
      # imports only Node builtins. FTP-mirroring node_modules (~50k files, one
      # TLS data connection per file) reliably exceeded any workable timeout —
      # it is what every previously failed deploy died on.
      - name: Assemble deploy package
        run: |
          mkdir -p deploy
          cp -r dist deploy/dist
          cp start.mjs deploy/start.mjs
          cp package.json deploy/package.json
          mkdir -p deploy/tmp
          date > deploy/tmp/restart.txt
          echo "Deploy payload:" && du -sh deploy && find deploy -type f | wc -l

      # .htaccess is deliberately NOT part of ./deploy/ and never uploaded here.
      # LiteSpeed only trusts a .htaccess owned by the vhost's own account user —
      # files written by this FTP sub-account land with a different owner, which
      # makes LiteSpeed refuse to read it ("Permission denied" despite 644 perms).
      # It's a static file that rarely changes; it's maintained by hand directly
      # in cPanel File Manager instead. See DEPLOYMENT.md.
      #
      # Using lftp instead of a Node-based FTP action: basic-ftp (which backs
      # several popular FTP GitHub Actions) hangs indefinitely on the data
      # connection against this server — it enforces TLS session reuse between
      # the control and data channels, which basic-ftp doesn't handle. lftp
      # (like curl, which was used to verify these credentials manually) does.
      #
      # --ignore-time on dist/: CI builds stamp fresh mtimes every run, so
      # date-based comparison (lftp's default) would re-upload everything;
      # size-based comparison skips unchanged files (safe here because built
      # assets have content-hashed names). tmp/ deliberately does NOT use it:
      # restart.txt's fresh mtime is what tells Passenger to restart the app,
      # so it must always re-upload rather than get skipped on a size match.
      - name: Deploy over FTPS with lftp
        timeout-minutes: 15
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -y && sudo apt-get install -y lftp
          REMOTE_DIR=/home/polishst/pos.polishstation.lk
          lftp -c "
            set cmd:fail-exit yes;
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set net:timeout 20;
            set net:max-retries 2;
            set net:reconnect-interval-base 5;
            set mirror:parallel-transfer-count 4;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" ftp://$FTP_HOST:21;
            mirror -R --ignore-time --parallel=4 ./deploy/dist/ $REMOTE_DIR/dist/;
            put ./deploy/start.mjs -o $REMOTE_DIR/start.mjs;
            put ./deploy/package.json -o $REMOTE_DIR/package.json;
            mirror -R ./deploy/tmp/ $REMOTE_DIR/tmp/;
          "
