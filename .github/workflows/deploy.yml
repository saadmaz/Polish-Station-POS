name: Build and deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build, package, and FTP deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      # Vite/TypeScript/ESLint etc. are no longer needed once the build is done —
      # dropping them keeps the FTP upload (and the server's disk usage) small.
      - name: Prune to production dependencies only
        run: npm prune --omit=dev

      - name: Assemble deploy package
        run: |
          mkdir -p deploy
          cp -r dist deploy/dist
          cp -r node_modules deploy/node_modules
          cp start.mjs deploy/start.mjs
          cp package.json deploy/package.json
          mkdir -p deploy/tmp
          date > deploy/tmp/restart.txt

      # .htaccess is deliberately NOT part of ./deploy/ and never uploaded here.
      # LiteSpeed only trusts a .htaccess owned by the vhost's own account user —
      # files written by this FTP sub-account land with a different owner, which
      # makes LiteSpeed refuse to read it ("Permission denied" despite 644 perms).
      # It's a static file that rarely changes; it's maintained by hand directly
      # in cPanel File Manager instead. See DEPLOYMENT.md.
      #
      # Using lftp instead of a Node-based FTP action: basic-ftp (which backs
      # several popular FTP GitHub Actions) hangs indefinitely on the data
      # connection against this server — it enforces TLS session reuse between
      # the control and data channels, which basic-ftp doesn't handle. lftp
      # (like curl, which was used to verify these credentials manually) does.
      - name: Deploy over FTPS with lftp
        timeout-minutes: 8
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -y && sudo apt-get install -y lftp
          lftp -c "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set net:timeout 20;
            set net:max-retries 2;
            set net:reconnect-interval-base 5;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" ftp://$FTP_HOST:21;
            mirror -R --verbose ./deploy/ /home/polishst/pos.polishstation.lk/
          "
