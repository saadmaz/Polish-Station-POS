name: Build and deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build, package, and FTP deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The lockfile is generated locally with npm 11; Node 22 ships npm 10.9.
      # Pinning CI to npm 11 keeps lockfile generation and validation on the
      # same major, which is what previously desynced `npm ci` ("Missing … from
      # lock file") even though the lock looked complete.
      - name: Pin npm to match local lockfile tooling
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      # node_modules is never uploaded: the build inlines every dependency into
      # dist/server/server.js (see scripts/bundle-server.mjs), and start.mjs
      # imports only Node builtins. FTP-mirroring node_modules (~50k files, one
      # TLS data connection per file) reliably exceeded any workable timeout —
      # it is what every previously failed deploy died on.
      - name: Assemble deploy package
        run: |
          mkdir -p deploy
          cp -r dist deploy/dist
          cp start.mjs deploy/start.mjs
          cp package.json deploy/package.json
          mkdir -p deploy/tmp
          date > deploy/tmp/restart.txt
          echo "Deploy payload:" && du -sh deploy && find deploy -type f | wc -l

      # The repo-root `htaccess` file is uploaded as the server's `.htaccess` —
      # it binds the domain to this Node app (Passenger directives; the
      # PassengerNodejs path must match a nodevenv that actually exists on the
      # server, currently Node 22). Earlier attempts to hand-maintain it in
      # cPanel stemmed from a misdiagnosis: the "Permission denied" the server
      # logged was the app root directory being mode 700, not .htaccess
      # ownership (fixed in the diagnostics step below).
      #
      # Using lftp instead of a Node-based FTP action: basic-ftp (which backs
      # several popular FTP GitHub Actions) hangs indefinitely on the data
      # connection against this server — it enforces TLS session reuse between
      # the control and data channels, which basic-ftp doesn't handle. lftp
      # (like curl, which was used to verify these credentials manually) does.
      #
      # --ignore-time on dist/: CI builds stamp fresh mtimes every run, so
      # date-based comparison (lftp's default) would re-upload everything;
      # size-based comparison skips unchanged files (safe here because built
      # assets have content-hashed names). tmp/ deliberately does NOT use it:
      # restart.txt's fresh mtime is what tells Passenger to restart the app,
      # so it must always re-upload rather than get skipped on a size match.
      - name: Deploy over FTPS with lftp
        timeout-minutes: 15
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -y && sudo apt-get install -y lftp
          REMOTE_DIR=/home/polishst/pos.polishstation.lk
          lftp -c "
            set cmd:fail-exit yes;
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set net:timeout 20;
            set net:max-retries 2;
            set net:reconnect-interval-base 5;
            set mirror:parallel-transfer-count 4;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" ftp://$FTP_HOST:21;
            mirror -R --delete --ignore-time --parallel=4 ./deploy/dist/ $REMOTE_DIR/dist/;
            put ./deploy/start.mjs -o $REMOTE_DIR/start.mjs;
            put ./deploy/package.json -o $REMOTE_DIR/package.json;
            put ./htaccess -o $REMOTE_DIR/.htaccess;
            mirror -R ./deploy/tmp/ $REMOTE_DIR/tmp/;
          "
          # --delete on dist/: built assets are content-hashed, so without it
          # every deploy leaves the previous build's files behind forever.

      # The upload succeeding doesn't mean the app is up — Passenger has to be
      # able to read .htaccess (LiteSpeed 503s the whole vhost when it can't:
      # "[HTAccess] Failed to open ...: Permission denied" in the server error
      # log) and start.mjs needs .env to exist server-side. Surface the server
      # state and app error log here so a broken deploy is diagnosable straight
      # from the Actions output instead of guessing.
      - name: Post-deploy server diagnostics
        if: always()
        timeout-minutes: 5
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          REMOTE_DIR=/home/polishst/pos.polishstation.lk
          # Single lftp session for everything: the host's brute-force
          # protection counts FTP logins, and multiple sessions per run got the
          # CI temporarily blocked with "530 Login authentication failed".
          #
          # IMPORTANT: never touch $REMOTE_DIR/id_rsa_new — despite the name,
          # that folder is the FTP deploy account's HOME DIRECTORY in cPanel.
          # A previous cleanup moved it and every FTP login started failing
          # with "421 Home directory not available" until it was restored.
          #
          # Hygiene fixes (idempotent — errors on already-fixed state are fine,
          # cmd:fail-exit stays off here):
          # - chmod 755 app root: it was 700 once, which stopped LiteSpeed from
          #   even entering the directory — the cause of the original
          #   site-wide 503s and every "[HTAccess] ... Permission denied" in
          #   the server log.
          # - chmod 600 .env: it was 644 (world-readable credentials).
          lftp -c "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set net:timeout 20;
            set net:max-retries 1;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" ftp://$FTP_HOST:21;
            chmod 755 $REMOTE_DIR;
            chmod 600 $REMOTE_DIR/.env;
            !echo '=== legacy cleanup (idempotent; errors once already gone are fine) ===';
            cd $REMOTE_DIR;
            rm -r $REMOTE_DIR/src;
            rm -r $REMOTE_DIR/public;
            rm -r $REMOTE_DIR/scripts;
            rm $REMOTE_DIR/.cpanel.yml;
            rm $REMOTE_DIR/.ftp-deploy-sync-state.json;
            rm $REMOTE_DIR/package-lock.json;
            rm $REMOTE_DIR/bun.lock;
            rm $REMOTE_DIR/bunfig.toml;
            rm $REMOTE_DIR/components.json;
            rm $REMOTE_DIR/eslint.config.js;
            rm $REMOTE_DIR/tsconfig.json;
            rm $REMOTE_DIR/vite.config.ts;
            rm $REMOTE_DIR/firebase.json;
            rm $REMOTE_DIR/firestore.rules;
            rm $REMOTE_DIR/firestore.indexes.json;
            rm $REMOTE_DIR/storage.rules;
            rm $REMOTE_DIR/.firebaserc;
            rm $REMOTE_DIR/.nvmrc;
            rm $REMOTE_DIR/.prettierrc;
            rm $REMOTE_DIR/.prettierignore;
            rm $REMOTE_DIR/.gitignore;
            rm $REMOTE_DIR/.env.example;
            rm $REMOTE_DIR/AGENTS.md;
            rm $REMOTE_DIR/DEPLOYMENT.md;
            rm $REMOTE_DIR/htaccess;
            !echo '=== deployed .htaccess ===';
            cat $REMOTE_DIR/.htaccess;
            !echo '=== dist/server listing (confirm bundled server.js) ===';
            cls -la $REMOTE_DIR/dist/server/;
            !echo '=== app error log (stderr.log), if the app has crashed ===';
            cat $REMOTE_DIR/stderr.log;
          " 2>&1 || true

          echo "=== Live site check ==="
          for host in pos.polishstation.lk www.pos.polishstation.lk; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://$host/" || echo "ERR")
            echo "https://$host/ -> $code"
          done
