name: Build and deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build, package, and FTP deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      # Vite/TypeScript/ESLint etc. are no longer needed once the build is done —
      # dropping them keeps the FTP upload (and the server's disk usage) small.
      - name: Prune to production dependencies only
        run: npm prune --omit=dev

      - name: Assemble deploy package
        run: |
          mkdir -p deploy
          cp -r dist deploy/dist
          cp -r node_modules deploy/node_modules
          cp start.mjs deploy/start.mjs
          cp package.json deploy/package.json
          mkdir -p deploy/tmp
          date > deploy/tmp/restart.txt

      # .htaccess is deliberately NOT uploaded here. LiteSpeed only trusts a
      # .htaccess owned by the vhost's own account user — files written by
      # this FTP sub-account land with a different owner, which makes
      # LiteSpeed refuse to read it ("Permission denied" despite 644 perms).
      # It's a static file that rarely changes; it's maintained by hand
      # directly in cPanel File Manager instead. See DEPLOYMENT.md.
      #
      # local-dir contains only dist/, node_modules/, start.mjs, package.json,
      # tmp/restart.txt — never .env, which lives only on the server and is
      # never part of this repo or this CI job.
      - name: Deploy over FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./deploy/
          server-dir: /home/polishst/pos.polishstation.lk/
          dangerous-clean-slate: false
          exclude: |
            .htaccess
