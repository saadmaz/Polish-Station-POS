name: Deploy Firestore/Storage rules

on:
  # Manual trigger: after setting the FIREBASE_SERVICE_ACCOUNT_JSON secret, run
  # this from the Actions tab to deploy the current rules without having to push
  # a rules change first.
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
      - "firebase.json"

jobs:
  deploy-rules:
    name: Deploy Firestore + Storage rules (REST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --include=dev

      - name: Write service account credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > /tmp/gcp-sa.json

      # Deploys via the firebaserules REST API (scripts/deploy-rules.ts) instead
      # of `firebase deploy`. The firebase-adminsdk service account can write
      # rules but lacks the serviceusage.services.get permission that
      # `firebase deploy` prechecks, which made the CLI fail with a 403.
      - name: Deploy rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa.json
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: npx tsx scripts/deploy-rules.ts

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/gcp-sa.json
