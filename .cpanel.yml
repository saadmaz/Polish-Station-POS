---
deployment:
  tasks:
    - echo "=== Polish Station POS deploy ==="

    # Use the virtualenv Node.js (v20) for npm commands
    - export PATH=/home/polishst/nodevenv/pos.polishstation.lk/20/bin:$PATH
    - export APP_ROOT=/home/polishst/pos.polishstation.lk

    # .env must already exist at $APP_ROOT/.env (uploaded manually — never committed).
    # It supplies VITE_FIREBASE_* (inlined into the client bundle by this build) and
    # FIREBASE_* / VITE_SENTRY_DSN (read at request time by the running server process).
    - test -f $APP_ROOT/.env || (echo "FATAL: $APP_ROOT/.env is missing — deploy aborted" && exit 1)

    # Install all deps (including devDependencies — needed for Vite build)
    - npm ci --include=dev

    # Build client + server bundles
    - npm run build

    - echo "=== Build complete ==="

    # Write Passenger config + Apache-layer compression/caching (applies as an
    # output filter even though Passenger owns the response — safe to combine).
    - echo "RemoveHandler .php .php5 .php7 .php8" > $APP_ROOT/.htaccess
    - echo "RemoveType application/x-httpd-php .php" >> $APP_ROOT/.htaccess
    - echo "PassengerEnabled on" >> $APP_ROOT/.htaccess
    - echo "PassengerBaseURI /" >> $APP_ROOT/.htaccess
    - echo "PassengerNodejs /home/polishst/nodevenv/pos.polishstation.lk/20/bin/node" >> $APP_ROOT/.htaccess
    - echo "PassengerAppRoot $APP_ROOT" >> $APP_ROOT/.htaccess
    - echo "PassengerAppType node" >> $APP_ROOT/.htaccess
    - echo "PassengerStartupFile start.mjs" >> $APP_ROOT/.htaccess
    - echo "<IfModule mod_deflate.c>" >> $APP_ROOT/.htaccess
    - echo "  AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json application/xml image/svg+xml" >> $APP_ROOT/.htaccess
    - echo "</IfModule>" >> $APP_ROOT/.htaccess
    - echo "<IfModule mod_expires.c>" >> $APP_ROOT/.htaccess
    - echo "  ExpiresActive on" >> $APP_ROOT/.htaccess
    - echo "  ExpiresByType application/javascript \"access plus 1 year\"" >> $APP_ROOT/.htaccess
    - echo "  ExpiresByType text/css \"access plus 1 year\"" >> $APP_ROOT/.htaccess
    - echo "  ExpiresByType image/svg+xml \"access plus 1 year\"" >> $APP_ROOT/.htaccess
    - echo "</IfModule>" >> $APP_ROOT/.htaccess
    - chmod 644 $APP_ROOT/.htaccess

    # Signal Passenger to gracefully reload the worker with the new build.
    # Without this, the old server.js bundle keeps serving from memory until
    # the app happens to idle out and get re-spawned.
    - mkdir -p $APP_ROOT/tmp
    - touch $APP_ROOT/tmp/restart.txt

    - echo "=== .htaccess written, Passenger restart triggered — deploy complete ==="
